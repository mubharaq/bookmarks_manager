name: bookmarks_manager
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  firebase_analytics: ^12.1.3
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.2
  flutter:
    sdk: flutter
  flutter_gen: ^5.13.0+1
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  logging: ^1.3.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4
  skeletonizer: ^2.1.3
  toastification: ^3.0.3
  url_launcher: ^6.3.2
  very_good_infinite_list: ^0.9.0
  wolt_modal_sheet: ^0.11.0

dev_dependencies:
  build_runner: any
  build_verify: any
  flutter_gen_runner: any
  flutter_test:
    sdk: flutter
  go_router_builder: any
  json_serializable: ^6.13.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: SF Pro
      fonts:
        - asset: assets/fonts/SF-Pro-Rounded-Regular.otf
        - asset: assets/fonts/SF-Pro-Rounded-Medium.otf
          weight: 500
        - asset: assets/fonts/SF-Pro-Rounded-Semibold.otf
          weight: 600
        - asset: assets/fonts/SF-Pro-Rounded-Bold.otf
          weight: 700
